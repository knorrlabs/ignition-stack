---
# Generated by ignition-stack. 1 Ignition 8.3 gateway, one postgres,
# hivemq, keycloak, n8n, frontend/backend network split.
x-ignition-common: &ignition-common
  image: &ignition-image ${IGNITION_IMAGE}

x-ignition-environment: &ignition-environment
  ACCEPT_IGNITION_EULA: "Y"
  GATEWAY_ADMIN_USERNAME: ${ADMIN_USERNAME}
  GATEWAY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  IGNITION_EDITION: standard
  TZ: ${TZ}

services:
  bootstrap:
    image: *ignition-image
    user: root
    entrypoint: ["/bin/bash", "/docker-bootstrap.sh"]
    environment:
      GATEWAY_NAME: ${GATEWAY_NAME}
    volumes:
      - ignition-data:/data
      - ./scripts/docker-bootstrap.sh:/docker-bootstrap.sh:ro
      - ./services/ignition:/template-source:ro

  gateway:
    <<: [*ignition-common]
    container_name: ${GATEWAY_NAME}
    hostname: ${GATEWAY_NAME}
    depends_on:
      db:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_HTTP_PORT}:8088"
    volumes:
      - ignition-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-environment
    command: >
      -n ${GATEWAY_NAME}
      -m 2048
      --
      -Dignition.config.mode=dev
    networks:
      - frontend
      - backend

  db:
    image: ${POSTGRES_IMAGE}
    hostname: db
    container_name: db-${GATEWAY_NAME}
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      EXTRA_DATABASES: ${EXTRA_DATABASES}
    volumes:
      - ./services/db/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "${DB_USER}"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - backend

  hivemq:
    image: ${HIVEMQ_IMAGE}
    hostname: hivemq
    container_name: hivemq-${COMPOSE_PROJECT_NAME}
    ports:
      - "${HIVEMQ_MQTT_PORT}:1883"
    networks:
      - backend

  keycloak:
    image: ${KEYCLOAK_IMAGE}
    hostname: keycloak
    container_name: keycloak-${COMPOSE_PROJECT_NAME}
    depends_on:
      db:
        condition: service_healthy
    command: ["start-dev", "--import-realm"]
    environment:
      TZ: ${TZ}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: http://localhost:${KEYCLOAK_HTTP_PORT}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_DB: postgres
      KC_DB_URL_HOST: ${DB_HOST}
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    volumes:
      - ./services/keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - backend

  n8n:
    image: ${N8N_IMAGE}
    hostname: n8n
    container_name: n8n-${COMPOSE_PROJECT_NAME}
    environment:
      TZ: ${TZ}
      N8N_SECURE_COOKIE: "false"
      N8N_RUNNERS_ENABLED: "true"
    ports:
      - "${N8N_PORT}:5678"
    networks:
      - frontend

volumes:
  ignition-data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
