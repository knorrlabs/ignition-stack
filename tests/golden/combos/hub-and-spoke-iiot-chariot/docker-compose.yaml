---
# Generated by ignition-stack. 3 Ignition 8.3 gateways, one postgres,
# chariot.
x-ignition-common: &ignition-common
  image: &ignition-image ${IGNITION_IMAGE}

x-ignition-environment: &ignition-environment
  ACCEPT_IGNITION_EULA: "Y"
  GATEWAY_ADMIN_USERNAME: ${ADMIN_USERNAME}
  GATEWAY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  IGNITION_EDITION: standard
  TZ: ${TZ}

services:
  bootstrap-hub:
    image: *ignition-image
    user: root
    entrypoint: ["/bin/bash", "/docker-bootstrap.sh"]
    environment:
      GATEWAY_NAME: ${COMPOSE_PROJECT_NAME}-hub
    volumes:
      - hub-data:/data
      - ./scripts/docker-bootstrap.sh:/docker-bootstrap.sh:ro
      - ./services/hub:/template-source:ro
      - ./modules/cache:/modules-cache:ro

  hub:
    <<: [*ignition-common]
    container_name: ${COMPOSE_PROJECT_NAME}-hub
    hostname: ${COMPOSE_PROJECT_NAME}-hub
    depends_on:
      db:
        condition: service_healthy
      bootstrap-hub:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_HUB_HTTP_PORT}:8088"
    volumes:
      - hub-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-environment
      ACCEPT_MODULE_LICENSES: "com.cirruslink.mqtt.engine.gateway"
      ACCEPT_MODULE_CERTS: "com.cirruslink.mqtt.engine.gateway"
      GATEWAY_NETWORK_ENABLED: "true"
      GATEWAY_NETWORK_ALLOWINCOMING: "true"
      GATEWAY_NETWORK_SECURITYPOLICY: "Unrestricted"
      GATEWAY_NETWORK_REQUIRESSL: "false"
      GATEWAY_NETWORK_REQUIRETWOWAYAUTH: "false"
    command: >
      -n ${COMPOSE_PROJECT_NAME}-hub
      -m 2048
      --
      -Dignition.config.mode=dev

  bootstrap-spoke-1:
    image: *ignition-image
    user: root
    entrypoint: ["/bin/bash", "/docker-bootstrap.sh"]
    environment:
      GATEWAY_NAME: ${COMPOSE_PROJECT_NAME}-spoke-1
    volumes:
      - spoke-1-data:/data
      - ./scripts/docker-bootstrap.sh:/docker-bootstrap.sh:ro
      - ./services/spoke-1:/template-source:ro
      - ./modules/cache:/modules-cache:ro

  spoke-1:
    <<: [*ignition-common]
    container_name: ${COMPOSE_PROJECT_NAME}-spoke-1
    hostname: ${COMPOSE_PROJECT_NAME}-spoke-1
    depends_on:
      bootstrap-spoke-1:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_SPOKE_1_HTTP_PORT}:8088"
    volumes:
      - spoke-1-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-environment
      IGNITION_EDITION: edge
      ACCEPT_MODULE_LICENSES: "com.cirruslink.mqtt.transmission.gateway"
      ACCEPT_MODULE_CERTS: "com.cirruslink.mqtt.transmission.gateway"
      GATEWAY_NETWORK_ENABLED: "true"
      GATEWAY_NETWORK_ALLOWINCOMING: "true"
      GATEWAY_NETWORK_SECURITYPOLICY: "Unrestricted"
      GATEWAY_NETWORK_REQUIRESSL: "false"
      GATEWAY_NETWORK_REQUIRETWOWAYAUTH: "false"
      GATEWAY_NETWORK_0_HOST: "hub"
      GATEWAY_NETWORK_0_PORT: "8088"
      GATEWAY_NETWORK_0_ENABLESSL: "false"
    command: >
      -n ${COMPOSE_PROJECT_NAME}-spoke-1
      -m 2048
      --
      -Dignition.config.mode=dev

  bootstrap-spoke-2:
    image: *ignition-image
    user: root
    entrypoint: ["/bin/bash", "/docker-bootstrap.sh"]
    environment:
      GATEWAY_NAME: ${COMPOSE_PROJECT_NAME}-spoke-2
    volumes:
      - spoke-2-data:/data
      - ./scripts/docker-bootstrap.sh:/docker-bootstrap.sh:ro
      - ./services/spoke-2:/template-source:ro
      - ./modules/cache:/modules-cache:ro

  spoke-2:
    <<: [*ignition-common]
    container_name: ${COMPOSE_PROJECT_NAME}-spoke-2
    hostname: ${COMPOSE_PROJECT_NAME}-spoke-2
    depends_on:
      bootstrap-spoke-2:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_SPOKE_2_HTTP_PORT}:8088"
    volumes:
      - spoke-2-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-environment
      IGNITION_EDITION: edge
      ACCEPT_MODULE_LICENSES: "com.cirruslink.mqtt.transmission.gateway"
      ACCEPT_MODULE_CERTS: "com.cirruslink.mqtt.transmission.gateway"
      GATEWAY_NETWORK_ENABLED: "true"
      GATEWAY_NETWORK_ALLOWINCOMING: "true"
      GATEWAY_NETWORK_SECURITYPOLICY: "Unrestricted"
      GATEWAY_NETWORK_REQUIRESSL: "false"
      GATEWAY_NETWORK_REQUIRETWOWAYAUTH: "false"
      GATEWAY_NETWORK_0_HOST: "hub"
      GATEWAY_NETWORK_0_PORT: "8088"
      GATEWAY_NETWORK_0_ENABLESSL: "false"
    command: >
      -n ${COMPOSE_PROJECT_NAME}-spoke-2
      -m 2048
      --
      -Dignition.config.mode=dev

  db:
    image: ${POSTGRES_IMAGE}
    hostname: db
    container_name: db-${COMPOSE_PROJECT_NAME}
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "${DB_USER}"]
      interval: 5s
      timeout: 10s
      retries: 10

  chariot:
    image: ${CHARIOT_IMAGE}
    hostname: chariot
    container_name: chariot-${COMPOSE_PROJECT_NAME}
    environment:
      TZ: ${TZ}
      ACCEPT_EULA: "true"
      ADMIN_PASSWORD: ${CHARIOT_ADMIN_PASSWORD}
    ports:
      - "${CHARIOT_HTTP_PORT}:8080"
      - "${CHARIOT_MQTT_PORT}:1883"

volumes:
  hub-data:
  spoke-1-data:
  spoke-2-data:
