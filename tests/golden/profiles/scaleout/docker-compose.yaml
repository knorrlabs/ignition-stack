---
# Generated by ignition-stack. 2 Ignition 8.3 gateways, one postgres,
# frontend/backend network split.
x-ignition-common: &ignition-common
  image: &ignition-image ${IGNITION_IMAGE}

x-ignition-environment: &ignition-environment
  ACCEPT_IGNITION_EULA: "Y"
  GATEWAY_ADMIN_USERNAME: ${ADMIN_USERNAME}
  GATEWAY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  IGNITION_EDITION: standard
  TZ: ${TZ}

services:
  bootstrap-frontend:
    image: *ignition-image
    user: root
    entrypoint: ["/bin/bash", "/docker-bootstrap.sh"]
    environment:
      GATEWAY_NAME: ${COMPOSE_PROJECT_NAME}-frontend
    volumes:
      - frontend-data:/data
      - ./scripts/docker-bootstrap.sh:/docker-bootstrap.sh:ro
      - ./services/frontend:/template-source:ro

  frontend:
    <<: [*ignition-common]
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    hostname: ${COMPOSE_PROJECT_NAME}-frontend
    depends_on:
      db:
        condition: service_healthy
      bootstrap-frontend:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_FRONTEND_HTTP_PORT}:8088"
    volumes:
      - frontend-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-environment
    command: >
      -n ${COMPOSE_PROJECT_NAME}-frontend
      -m 2048
      --
      -Dignition.config.mode=dev
    networks:
      - frontend
      - backend

  bootstrap-backend:
    image: *ignition-image
    user: root
    entrypoint: ["/bin/bash", "/docker-bootstrap.sh"]
    environment:
      GATEWAY_NAME: ${COMPOSE_PROJECT_NAME}-backend
    volumes:
      - backend-data:/data
      - ./scripts/docker-bootstrap.sh:/docker-bootstrap.sh:ro
      - ./services/backend:/template-source:ro

  backend:
    <<: [*ignition-common]
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    hostname: ${COMPOSE_PROJECT_NAME}-backend
    depends_on:
      db:
        condition: service_healthy
      bootstrap-backend:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_BACKEND_HTTP_PORT}:8088"
    volumes:
      - backend-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-environment
    command: >
      -n ${COMPOSE_PROJECT_NAME}-backend
      -m 2048
      --
      -Dignition.config.mode=dev
    networks:
      - backend

  db:
    image: ${POSTGRES_IMAGE}
    hostname: db
    container_name: db-${COMPOSE_PROJECT_NAME}
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "${DB_USER}"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - backend

volumes:
  frontend-data:
  backend-data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
