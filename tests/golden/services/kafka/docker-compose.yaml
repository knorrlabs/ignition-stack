---
# Generated by ignition-stack. 1 Ignition 8.3 gateway, kafka.
x-ignition-common: &ignition-common
  image: &ignition-image ${IGNITION_IMAGE}

x-ignition-environment: &ignition-environment
  ACCEPT_IGNITION_EULA: "Y"
  GATEWAY_ADMIN_USERNAME: ${ADMIN_USERNAME}
  GATEWAY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  IGNITION_EDITION: standard
  TZ: ${TZ}

services:
  bootstrap:
    image: *ignition-image
    user: root
    entrypoint: ["/bin/bash", "/docker-bootstrap.sh"]
    environment:
      GATEWAY_NAME: ${GATEWAY_NAME}
    volumes:
      - ignition-data:/data
      - ./scripts/docker-bootstrap.sh:/docker-bootstrap.sh:ro
      - ./services/ignition:/template-source:ro

  gateway:
    <<: [*ignition-common]
    container_name: ${GATEWAY_NAME}
    hostname: ${GATEWAY_NAME}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_HTTP_PORT}:8088"
    volumes:
      - ignition-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-environment
    command: >
      -n ${GATEWAY_NAME}
      -m 2048
      --
      -Dignition.config.mode=dev

  kafka:
    image: ${KAFKA_IMAGE}
    hostname: kafka
    container_name: kafka-${COMPOSE_PROJECT_NAME}
    environment:
      TZ: ${TZ}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    ports:
      - "${KAFKA_PORT}:9094"

volumes:
  ignition-data:
