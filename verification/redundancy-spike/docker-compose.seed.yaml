# Scratch compose for the Phase 3 redundancy spike -- ZERO-TOUCH SEED stack.
# NOT generated by, and NOT consumed by, the ignition-stack CLI.
#
# Goal: bring up a master/backup pair that pairs with NO UI interaction at all,
# by combining the two things the env-only path was missing:
#   1. An OPEN incoming Gateway Network policy on both nodes (Unrestricted +
#      requireSSL=false), set via env. This is what lets a plain (non-SSL) GAN
#      connection be accepted and auto-approved -- the master's DEFAULT policy
#      is requireSSL=true + ApprovedOnly, which 403-rejects a plain link.
#   2. A pre-seeded data/redundancy.xml on each node (the 8.3 backing store for
#      redundancy mode), dropped in by a per-node init container before the
#      gateway starts. master role=Master; backup role=Backup, host=master,
#      port=8088, enableSsl=false.
#
# Plain transport (8088, no SSL) is used deliberately: it avoids the Gateway
# Network server-certificate trust handshake entirely, which is the one step
# that otherwise requires a manual "Approve" click in the UI. This mirrors the
# publicdemo-all dev stack (8088 / no SSL / Unrestricted) and the user's recall.
#
# The init containers use the ignition image so Docker first populates each
# empty named volume from the image's /usr/local/bin/ignition/data layer; the
# init then drops redundancy.xml in and hands ownership to the gateway uid.

x-ignition-common: &ignition-common
  image: inductiveautomation/ignition:8.3.6
  restart: "no"

x-commissioning: &commissioning
  ACCEPT_IGNITION_EULA: "Y"
  GATEWAY_ADMIN_USERNAME: admin
  GATEWAY_ADMIN_PASSWORD: password
  IGNITION_EDITION: standard
  TZ: America/Los_Angeles

x-open-gan-policy: &open-gan-policy
  # Open incoming GAN policy so a plain (non-SSL) connection is accepted and
  # auto-approved with no UI. requireSSL=false is the load-bearing one: the
  # default (true) 403-rejects the plain redundancy link.
  GATEWAY_NETWORK_ENABLED: "true"
  GATEWAY_NETWORK_ALLOWINCOMING: "true"
  GATEWAY_NETWORK_SECURITYPOLICY: "Unrestricted"
  GATEWAY_NETWORK_REQUIRESSL: "false"
  GATEWAY_NETWORK_REQUIRETWOWAYAUTH: "false"

services:
  master-seed:
    image: inductiveautomation/ignition:8.3.6
    user: root
    entrypoint: ["/bin/bash", "-c"]
    command:
      - 'cp /seed/master-redundancy.xml /usr/local/bin/ignition/data/redundancy.xml && chown 2003:2003 /usr/local/bin/ignition/data/redundancy.xml && echo "seeded master redundancy.xml"'
    volumes:
      - master-data:/usr/local/bin/ignition/data
      - ./seed/master-redundancy.xml:/seed/master-redundancy.xml:ro

  backup-seed:
    image: inductiveautomation/ignition:8.3.6
    user: root
    entrypoint: ["/bin/bash", "-c"]
    command:
      - 'cp /seed/backup-redundancy.xml /usr/local/bin/ignition/data/redundancy.xml && chown 2003:2003 /usr/local/bin/ignition/data/redundancy.xml && echo "seeded backup redundancy.xml"'
    volumes:
      - backup-data:/usr/local/bin/ignition/data
      - ./seed/backup-redundancy.xml:/seed/backup-redundancy.xml:ro

  master:
    <<: *ignition-common
    container_name: redspike-master
    hostname: master
    depends_on:
      master-seed:
        condition: service_completed_successfully
    ports:
      - "9088:8088"
    volumes:
      - master-data:/usr/local/bin/ignition/data
    environment:
      <<: [*commissioning, *open-gan-policy]
    command: >
      -n master
      -m 1024

  backup:
    <<: *ignition-common
    container_name: redspike-backup
    hostname: backup
    depends_on:
      backup-seed:
        condition: service_completed_successfully
    ports:
      - "9089:8088"
    volumes:
      - backup-data:/usr/local/bin/ignition/data
    environment:
      <<: [*commissioning, *open-gan-policy]
    # NOTE: no -n rename on the backup. Per the IA docker-image warning, a
    # backup must not be renamed; it adopts the master's system name on pairing.
    command: >
      -m 1024

volumes:
  master-data:
  backup-data:
