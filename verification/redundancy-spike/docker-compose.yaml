# Scratch compose for the Phase 3 redundancy spike -- DEFAULT-PATH stack.
# NOT generated by, and NOT consumed by, the ignition-stack CLI.
#
# Two vanilla 8.3.6 gateways (master + backup) on one shared network, each with
# its own named volume, env-driven commissioning so neither needs the wizard.
# Deliberately MINIMAL: no Gateway Network env vars at all. This is the honest
# "out of the box" baseline used to record the manual pairing runbook -- you
# configure redundancy by hand in the UI and observe exactly which steps
# (mode selection + certificate approval) the platform forces.
#
# For the zero-touch experiment (open GAN policy via env + a pre-seeded
# redundancy.xml), see ./docker-compose.seed.yaml.

x-ignition-common: &ignition-common
  image: inductiveautomation/ignition:8.3.6
  restart: "no"

x-commissioning: &commissioning
  ACCEPT_IGNITION_EULA: "Y"
  GATEWAY_ADMIN_USERNAME: admin
  GATEWAY_ADMIN_PASSWORD: password
  IGNITION_EDITION: standard
  TZ: America/Los_Angeles

services:
  master:
    <<: *ignition-common
    container_name: redspike-master
    hostname: master
    ports:
      - "9088:8088"   # gateway web UI -> http://localhost:9088
    volumes:
      - master-data:/usr/local/bin/ignition/data
    environment:
      <<: *commissioning
    command: >
      -n master
      -m 1024

  backup:
    <<: *ignition-common
    container_name: redspike-backup
    hostname: backup
    ports:
      - "9089:8088"   # gateway web UI -> http://localhost:9089
    volumes:
      - backup-data:/usr/local/bin/ignition/data
    environment:
      <<: *commissioning
    command: >
      -n backup
      -m 1024

volumes:
  master-data:
  backup-data:
