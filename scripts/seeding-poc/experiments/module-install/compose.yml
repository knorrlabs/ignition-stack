---
# Experiment C: module install.
#
# Tests which of options (a)/(b)/(c) from q-module-install actually causes
# Ignition 8.3.6 to load a third-party .modl, and what value
# GATEWAY_MODULES_ENABLED has to take for the module to auto-load.
#
# Option (a) - runtime volume-mount: this compose mounts the cached
# MQTT-Engine-signed-5.0.2.modl directly into the gateway's user-lib/modules/
# dir before the gateway process reads the module directory. No derived
# Dockerfile, no bootstrap copy.
#
# GATEWAY_MODULES_ENABLED is set via .env so each run can flip between
# (i) the module identifier ("com.cirruslink.mqtt.engine.gateway")
# (ii) the in-container path ("/usr/local/bin/ignition/user-lib/modules/MQTT-Engine-signed-5.0.2.modl")
# (iii) just the filename ("MQTT-Engine-signed-5.0.2.modl")
# (iv) unset entirely (auto-load whatever is in user-lib/modules/)
x-ignition-environment: &ignition-environment
  ACCEPT_IGNITION_EULA: "Y"
  GATEWAY_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  IGNITION_EDITION: standard
  TZ: ${TZ:-UTC}
  # The three module env vars cooperate for clean third-party install:
  #   GATEWAY_MODULES_ENABLED: enable/whitelist (restricts uninstall)
  #   ACCEPT_MODULE_LICENSES:  auto-accept the third-party EULA
  #   ACCEPT_MODULE_CERTS:     auto-trust the module signing certificate
  # All three take comma-delimited fully-qualified module identifiers.
  GATEWAY_MODULES_ENABLED: ${GATEWAY_MODULES_ENABLED:-}
  ACCEPT_MODULE_LICENSES: ${ACCEPT_MODULE_LICENSES:-}
  ACCEPT_MODULE_CERTS: ${ACCEPT_MODULE_CERTS:-}

services:
  gateway:
    image: inductiveautomation/ignition:8.3.6
    container_name: ${GATEWAY_NAME}
    hostname: ${GATEWAY_NAME}
    ports:
      - "${GATEWAY_HTTP_PORT:-9088}:8088"
    volumes:
      # Mount the cached .modl directly into the gateway's module dir.
      - ${MODL_PATH}:/usr/local/bin/ignition/user-lib/modules/MQTT-Engine-signed-5.0.2.modl:ro
    environment:
      <<: *ignition-environment
    command: >
      -n ${GATEWAY_NAME}
      -m 2048
