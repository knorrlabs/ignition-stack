# RabbitMQ - message broker; the bundled enabled_plugins turns on the MQTT
# plugin so it can act as an MQTT broker alongside AMQP.
name: rabbitmq
kind: mqtt-broker
summary: RabbitMQ with MQTT plugin and management UI
image: rabbitmq:4.3.1-management
image_env: RABBITMQ_IMAGE
network: backend
provides:
  - mqtt-broker
requires: []
env:
  RABBITMQ_USER: ignition
  RABBITMQ_PASSWORD: ignition
  RABBITMQ_MQTT_PORT: "1885"
  RABBITMQ_MGMT_PORT: "15672"
seeds_gateway_resources: false
# One MQTT broker per stack; RabbitMQ fronts Sparkplug MQTT on 1883 via its
# enabled mqtt plugin. Wires names the Cirrus Link modules the IIoT overlay uses.
singleton: true
# issue #67: relax the singleton bound to attached instances, so a
# deliberately-unattached (flat) duplicate may sit alongside the wired one.
singleton_scope: attached
wires:
  mqtt:
    transmission_module: mqtt-transmission
    engine_module: mqtt-engine
    port: 1883
post_setup:
  - connection: mqtt-engine-connection
    reason: >-
      Linking an Ignition gateway to the broker needs the Cirrus Link MQTT
      Engine/Transmission module plus an MQTT server endpoint in the gateway,
      configured once the stack is up.
