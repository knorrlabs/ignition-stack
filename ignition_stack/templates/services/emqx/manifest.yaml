# EMQX - MQTT broker with a web dashboard.
name: emqx
kind: mqtt-broker
summary: EMQX with management dashboard
image: emqx/emqx:6.2.0
image_env: EMQX_IMAGE
network: backend
provides:
  - mqtt-broker
requires: []
env:
  EMQX_MQTT_PORT: "1884"
  EMQX_DASHBOARD_PORT: "18083"
  EMQX_DASHBOARD_PASSWORD: public
seeds_gateway_resources: false
# One MQTT broker per stack (issue #43 non-goal: no multi-broker). The wires
# block names the Cirrus Link Transmission/Engine modules the Phase-3 IIoT
# overlay fans out, plus the Sparkplug-capable MQTT port (1883).
singleton: true
# issue #67: relax the singleton bound to attached instances, so a
# deliberately-unattached (flat) duplicate may sit alongside the wired one.
singleton_scope: attached
wires:
  mqtt:
    transmission_module: mqtt-transmission
    engine_module: mqtt-engine
    port: 1883
post_setup:
  - connection: mqtt-engine-connection
    reason: >-
      Linking an Ignition gateway to the broker needs the Cirrus Link MQTT
      Engine/Transmission module plus an MQTT server endpoint in the gateway,
      configured once the stack is up.
