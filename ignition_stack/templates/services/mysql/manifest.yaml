# MySQL - SQL database. Selecting MySQL makes the resolver attach the
# mysql-jdbc driver to every gateway (Ignition ships no MySQL driver built-in).
name: mysql
kind: database
summary: MySQL database; pulls in the MySQL JDBC driver for the gateway
image: mysql:9
image_env: MYSQL_IMAGE
network: backend
provides:
  - sql-database
  - mysql-compatible
requires: []
env: {}
seeds_gateway_resources: false
# One database per stack; never on an Edge gateway (see postgres manifest).
singleton: true
# issue #67: relax the singleton bound to attached instances, so a
# deliberately-unattached (flat) duplicate may sit alongside the wired one.
singleton_scope: attached
placement:
  never_on_edge: true
post_setup: []
