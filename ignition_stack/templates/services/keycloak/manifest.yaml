# Keycloak - OIDC/SAML identity provider for gateway single sign-on.
# Requires a SQL database; the resolver auto-adds Postgres (and a dedicated
# "keycloak" logical database) when none is selected.
name: keycloak
kind: idp
summary: Keycloak identity provider for gateway OIDC/SAML single sign-on.
image: quay.io/keycloak/keycloak:26.6.2
image_env: KEYCLOAK_IMAGE
network: backend
provides:
  - oidc-idp
requires:
  - sql-database
env:
  KEYCLOAK_ADMIN_USER: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
  KEYCLOAK_HTTP_PORT: "8081"
seeds_gateway_resources: true
# One IdP per stack: a second Keycloak would collide on its KEYCLOAK_* env keys
# and the shared realm seed. Keycloak may run alongside an Edge gateway via SSO,
# so it sets no never_on_edge placement (only its database does).
singleton: true
post_setup:
  - connection: identity-provider
    reason: >-
      This stack seeds the Keycloak OIDC connection end to end: the realm ships a
      fixed demo client secret, and the gateway's identity-provider config
      embeds the matching secret as a JWE blob (the same file-seeding the
      seeding matrix verifies for db-connection). The provider comes up
      configured with no UI step. This is a verification, not a manual
      procedure - confirm a Test Login succeeds, and reach for the steps below
      only if it does not.
