# Chariot - the Cirrus Link MQTT broker, the primary pick for Sparkplug SCADA
# demos. Web UI + MQTT, commissioned from env on first boot.
name: chariot
kind: mqtt-broker
summary: Cirrus Link Chariot (Sparkplug-native broker)
image: cirruslink/chariot:3.0.0
image_env: CHARIOT_IMAGE
network: backend
provides:
  - mqtt-broker
requires: []
env:
  CHARIOT_ADMIN_PASSWORD: password
  CHARIOT_HTTP_PORT: "8090"
  CHARIOT_MQTT_PORT: "1886"
seeds_gateway_resources: false
# One MQTT broker per stack; wires block names the Cirrus Link modules + the
# Sparkplug-capable MQTT port the Phase-3 IIoT overlay consumes.
singleton: true
# issue #67: relax the singleton bound to attached instances, so a
# deliberately-unattached (flat) duplicate may sit alongside the wired one.
singleton_scope: attached
wires:
  mqtt:
    transmission_module: mqtt-transmission
    engine_module: mqtt-engine
    port: 1883
post_setup:
  - connection: mqtt-engine-connection
    reason: >-
      Linking an Ignition gateway to the broker needs the Cirrus Link MQTT
      Engine/Transmission module plus an MQTT server endpoint in the gateway,
      configured once the stack is up.
